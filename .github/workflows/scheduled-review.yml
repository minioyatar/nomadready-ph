name: Scheduled PR Review - Daily 3am PHT

# Runs every day at 3am Philippine Time (PHT = UTC+8 = 19:00 UTC)
# Manually triggerable from the GitHub Actions tab (workflow_dispatch).

"on":
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  review-open-prs:
    name: Claude Reviews All Open PRs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Review all open PRs with inline comments
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 .github/scripts/scheduled_review.py
