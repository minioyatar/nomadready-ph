name: CI

"on":
  pull_request:
    types: [opened, synchronize, reopened]

jobs:

  # ── 1. Python linting via Ruff ──────────────────────────────────────────────
  backend-lint:
    name: Python Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/ruff-action@d0a0e814ec17e92d33be7d24dd922b479f1bcd38 # v1
        with:
          src: "./backend"

  # ── 2. JavaScript linting via ESLint ────────────────────────────────────────
  frontend-lint:
    name: JavaScript Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
        working-directory: frontend
      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

  # ── 3. Backend Tests ─────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nomadready_test
          POSTGRES_USER: nomadready
          POSTGRES_PASSWORD: nomadready_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Run Django tests
        run: python manage.py test
        working-directory: backend
        env:
          POSTGRES_DB: nomadready_test
          POSTGRES_USER: nomadready
          POSTGRES_PASSWORD: nomadready_dev
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: "True"
          OPENAI_API_KEY: ci-placeholder

  # ── 4. Frontend Production Build ──────────────────────────────────────────────
  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build production bundle
        run: npm run build
        working-directory: frontend
