name: CI — Lint + Graphify

"on":
  pull_request:
    types: [opened, synchronize, reopened]

jobs:

  # ── 1. Python linting via Ruff ──────────────────────────────────────────────
  backend-lint:
    name: Python Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/ruff-action@d0a0e814ec17e92d33be7d24dd922b479f1bcd38 # v1
        with:
          src: "./backend"

  # ── 2. JavaScript linting via ESLint ────────────────────────────────────────
  frontend-lint:
    name: JavaScript Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
        working-directory: frontend
      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

  # ── 3. Backend Tests ─────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nomadready_test
          POSTGRES_USER: nomadready
          POSTGRES_PASSWORD: nomadready_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Run Django tests
        run: python manage.py test
        working-directory: backend
        env:
          POSTGRES_DB: nomadready_test
          POSTGRES_USER: nomadready
          POSTGRES_PASSWORD: nomadready_dev
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: "True"
          OPENAI_API_KEY: ci-placeholder

  # ── 4. Frontend Production Build ──────────────────────────────────────────────
  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build production bundle
        run: npm run build
        working-directory: frontend

  # ── 5. Graphify Blast Radius — Analysis (read-only, runs untrusted PR code) ──
  graphify-blast-radius:
    name: Graphify Blast Radius
    runs-on: ubuntu-latest
    continue-on-error: true       # Stage 1: never blocks merge
    if: github.event_name == 'pull_request'
    permissions:
      contents: read              # read-only — no PR write here
    steps:
      - name: Checkout PR head (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Read pinned Graphify version
        id: gfy-version
        run: |
          VERSION=$(cat .graphify-version | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Pinned version: $VERSION"

      - name: Install uv
        run: pip install uv --quiet

      - name: Get uv cache dir
        id: uv-cache
        run: echo "dir=$(uv cache dir)" >> "$GITHUB_OUTPUT"

      - name: Cache uv downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.uv-cache.outputs.dir }}
          key: uv-${{ runner.os }}-graphify-${{ steps.gfy-version.outputs.version }}
          restore-keys: uv-${{ runner.os }}-graphify-

      - name: Install pinned Graphify
        run: |
          uv tool install --force "graphifyy==${{ steps.gfy-version.outputs.version }}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Graphify shim
        run: "$HOME/.local/bin/graphify" --version

      - name: Verify PATH propagation
        run: |
          command -v graphify
          graphify --version

      - name: Fetch base branch for worktree
        run: git fetch origin ${{ github.base_ref }}

      - name: Build head graph
        run: graphify . --code-only
        env:
          GRAPHIFY_SKIP_HOOK: "1"

      - name: Run blast-radius analysis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GRAPHIFY_VERSION: ${{ steps.gfy-version.outputs.version }}
        run: python3 .github/scripts/graphify_blast_radius.py

      - name: Upload blast-radius report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: graphify-blast-radius-pr-${{ github.event.pull_request.number }}
          path: /tmp/graphify-blast-radius-report.md
          retention-days: 14

  # ── 6. Graphify Blast Radius — Publish (trusted code, PR write permission) ──
  graphify-publish-comment:
    name: Graphify Publish Comment
    runs-on: ubuntu-latest
    continue-on-error: true       # Stage 1: never blocks merge
    needs: graphify-blast-radius
    if: |
      github.event_name == 'pull_request' &&
      (needs.graphify-blast-radius.result == 'success' ||
       needs.graphify-blast-radius.result == 'failure')
    permissions:
      pull-requests: write        # write permission in this trusted job only
      contents: read
    steps:
      - name: Download blast-radius report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: graphify-blast-radius-pr-${{ github.event.pull_request.number }}
          path: blast-radius
        continue-on-error: true   # if no artifact, skip comment gracefully

      - name: Check report availability
        id: report
        run: |
          if [ -f "blast-radius/graphify-blast-radius-report.md" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::Graphify blast-radius report not found — skipping PR comment"
          fi

      - name: Publish PR comment
        if: steps.report.outputs.available == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'blast-radius/graphify-blast-radius-report.md';
            const sentinel = '<!-- graphify-blast-radius -->';
            const body = fs.readFileSync(reportPath, 'utf8');

            try {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number }
              );
              const existing = comments.find(c => c.body && c.body.includes(sentinel));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: existing.id, body
                });
                core.info(`Updated comment #${existing.id}`);
              } else {
                const result = await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number, body
                });
                core.info(`Created comment #${result.data.id}`);
              }
            } catch (e) {
              core.warning(`PR comment failed: ${e.message}. Report available as artifact.`);
            }
